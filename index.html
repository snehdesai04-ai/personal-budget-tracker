<!DOCTYPE html>
<!--
  PERSONAL BUDGET TRACKER
  Built by: Sneh Desai
  -----------------------------------------------
  FILE 1 of 4: index.html
  This file contains ONLY the structure (HTML).
  Think of this as the skeleton of the app.
  
  It links to:
    - style.css  (the design/look)
    - script.js  (the logic/behaviour)
    - schema.sql (the database design)
-->

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Budget Tracker | Sneh Desai</title>

  <!-- LINKING THE CSS FILE — this is how HTML and CSS connect -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP HEADER BAR -->
  <header>
    <h1>💰 Personal Budget Tracker</h1>
    <p>Track your income and expenses — built by Sneh Desai</p>
  </header>

  <!-- MAIN CONTENT WRAPPER -->
  <div class="container">

    <!-- SUMMARY CARDS (Balance / Income / Expenses) -->
    <div class="summary">
      <div class="card balance">
        <div class="label">Current Balance</div>
        <div class="amount" id="balance">$0.00</div>
      </div>
      <div class="card income">
        <div class="label">Total Income</div>
        <div class="amount" id="total-income">$0.00</div>
      </div>
      <div class="card expense">
        <div class="label">Total Expenses</div>
        <div class="amount" id="total-expense">$0.00</div>
      </div>
    </div>

    <!-- BOTTOM GRID: Form (left) + Transaction List (right) -->
    <div class="main-grid">

      <!-- ADD TRANSACTION FORM -->
      <div class="panel">
        <h2>➕ Add Transaction</h2>

        <!-- INCOME / EXPENSE TOGGLE -->
        <div class="form-group">
          <label>Type</label>
          <div class="type-toggle">
            <label class="type-income">
              <input type="radio" name="type" value="income" checked />
              <span>+ Income</span>
            </label>
            <label class="type-expense">
              <input type="radio" name="type" value="expense" />
              <span>− Expense</span>
            </label>
          </div>
        </div>

        <!-- DESCRIPTION FIELD -->
        <div class="form-group">
          <label for="desc">Description</label>
          <input type="text" id="desc" placeholder="e.g. SaskTel Salary" maxlength="50"/>
        </div>

        <!-- AMOUNT FIELD -->
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01"/>
        </div>

        <!-- CATEGORY DROPDOWN -->
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Salary">Salary / Wages</option>
            <option value="Freelance">Freelance / Side Income</option>
            <option value="Food">Food & Dining</option>
            <option value="Transport">Transport</option>
            <option value="Rent">Rent / Housing</option>
            <option value="Utilities">Utilities / Bills</option>
            <option value="Education">Education</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- DATE FIELD -->
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date"/>
        </div>

        <!-- SUBMIT BUTTON — calls addTransaction() in script.js -->
        <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
      </div>

      <!-- TRANSACTION LIST PANEL -->
      <div class="panel">
        <h2>📋 Transactions</h2>

        <!-- FILTER BUTTONS -->
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
          <button class="filter-btn" onclick="setFilter('expense', this)">Expenses</button>
        </div>

        <!-- TRANSACTIONS APPEAR HERE (populated by script.js) -->
        <div class="transaction-list" id="transaction-list">
          <div class="empty-state">
            <div>📭</div>
            No transactions yet.<br/>Add one using the form!
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- SUCCESS NOTIFICATION (shown briefly after adding) -->
  <div class="flash" id="flash">✓ Transaction added!</div>

  <!-- LINKING THE JAVASCRIPT FILE — always at the bottom of HTML -->
  <script src="script.js"></script>

</body>
</html>
